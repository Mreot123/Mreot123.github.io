<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0; /*페이지 요소 초기화*/
        }
        body{
            margin-top: 20px;
        }
        ul{
            list-style-type: none;
        }
        #menu{
            width: 500px;
            padding: 10px;
            margin: 20px 0 0 40px;
            background-color: #eeeeee;
            border: solid 1px #aaaaaa;
            text-align: center;
        }
        #menu li{
            display: inline;
        }
        a{
            display: block;
        }
        .green_box{
            display: inline-block; /*inline으로 만들어줌*/
            width: 150px;
            height: 75px;
            margin: 10px;
            border: solid 3px #73AD21;
        }
        #menu1 li{
            display: inline-block;
            padding: 10px;
        }
        #menu1{
            background-color: skyblue;
            text-align: center;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
